{% extends "base.html" %}
{% block title %}Editar Movimiento Cta. Cte.{% endblock %}
{% block content %}
<div class="d-flex align-items-center mb-4">
    <a href="{{ url_for('panel.panel', proveedor_id=cc.proveedor_id, vista='cc') }}" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
    <h4 class="mb-0">Editar Movimiento de Cuenta Corriente</h4>
</div>
<div class="card">
    <div class="card-body">
        <form method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="row">
                <div class="col-md-2 mb-3">
                    <label class="form-label">Fecha</label>
                    <input type="date" name="fecha" class="form-control" required value="{{ cc.fecha.isoformat() }}">
                </div>
                <div class="col-md-2 mb-3">
                    <label class="form-label">Tipo</label>
                    <select name="tipo" class="form-select">
                        {% for t in ['Factura', 'Pago', 'Adelanto', 'Nota de Credito', 'Nota de Debito'] %}
                        <option {% if cc.tipo == t %}selected{% endif %}>{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-2 mb-3">
                    <label class="form-label">Comprobante</label>
                    <input type="text" name="numero_comprobante" class="form-control" value="{{ cc.numero_comprobante or '' }}">
                </div>
                <div class="col-md-3 mb-3">
                    <label class="form-label">Descripcion</label>
                    <input type="text" name="descripcion" class="form-control" value="{{ cc.descripcion or '' }}">
                </div>
                <div class="col-md-1 mb-3">
                    <label class="form-label">Debe</label>
                    <input type="number" step="0.01" name="debe" class="form-control" value="{{ cc.debe if cc.debe else '' }}">
                </div>
                <div class="col-md-1 mb-3">
                    <label class="form-label">Haber</label>
                    <input type="number" step="0.01" name="haber" class="form-control" value="{{ cc.haber if cc.haber else '' }}">
                </div>
            </div>
            <hr>
            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Guardar Cambios</button>
            <a href="{{ url_for('panel.panel', proveedor_id=cc.proveedor_id, vista='cc') }}" class="btn btn-outline-secondary ms-2">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
