<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesion - JUMAF / JUMASA</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            background: #ffffff;
            padding: 1.5rem;
            text-align: center;
            border-bottom: 3px solid #7a8e8c;
        }
        .login-header img {
            max-height: 60px;
            margin: 0 8px;
        }
        .login-header p {
            margin: 0.5rem 0 0;
            color: #555;
            font-size: 0.9rem;
        }
        .login-body {
            padding: 2rem;
        }
        .form-control:focus {
            border-color: #7a8e8c;
            box-shadow: 0 0 0 0.2rem rgba(122, 142, 140, 0.25);
        }
        .btn-login {
            background: #1a1a2e;
            border: none;
            padding: 0.6rem;
            font-size: 1rem;
            width: 100%;
        }
        .btn-login:hover {
            background: #2d2d4e;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <div>
                <img src="{{ url_for('static', filename='img/jumaf_logo.png') }}" alt="JUMAF S.A.">
                <img src="{{ url_for('static', filename='img/jumasa_logo.png') }}" alt="JUMASA S.A.">
            </div>
            <p>Gestion de Telas</p>
        </div>
        <div class="login-body">
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
                <small>{{ message }}</small>
                <button type="button" class="btn-close btn-close-sm" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" name="username" class="form-control" placeholder="Ingrese su usuario" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" name="password" class="form-control" placeholder="Ingrese su contraseña" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-login">
                    <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesion
                </button>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
